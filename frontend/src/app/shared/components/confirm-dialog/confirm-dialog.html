<h2 mat-dialog-title>
  {{ data.title }}
</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button
    mat-button
    type="button"
    (click)="cancel()"
  >
    {{ data.cancelText ?? 'Cancelar' }}
  </button>

  <button
    mat-flat-button
    type="button"
    class="danger-button"
    (click)="confirm()"
  >
    {{ data.confirmText ?? 'Confirmar' }}
  </button>
</mat-dialog-actions>
