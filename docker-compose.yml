services:
  api:
    container_name: order-management-api
    build:
      context: .
      dockerfile: src/OrderManagement.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Data Source=/app/Data/order-management.db
    ports:
      - "8080:8080"
    volumes:
      - order-management-data:/app/Data
    restart: unless-stopped

  frontend:
    container_name: order-management-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  order-management-data:
    name: order-management-data